name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: [ "enhancement" ]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed for cross-platform Compose?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your idea (API, UI component, etc.)
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which Calf module should this feature be added to?
      options:
        - calf-ui
        - calf-file-picker
        - calf-webview
        - calf-permissions
        - calf-cupertino-icons
        - core
        - other
    validations:
      required: true

  - type: input
    id: other_module
    attributes:
      label: Specify Other Module
      description: If you selected "other" above, please specify the module name.
      placeholder: e.g., calf-geo, calf-navigation
    if:
      field: module
      equals: other

  - type: dropdown
    id: target
    attributes:
      label: Target Platform(s)
      options:
        - Android
        - iOS
        - Desktop
        - Web
    validations:
      required: true