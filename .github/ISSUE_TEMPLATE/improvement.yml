name: Improvement
description: Suggest improvements to existing functionality
title: "[Improvement]: "
labels: [ "improvement" ]
body:
  - type: textarea
    id: context
    attributes:
      label: Current Behavior
      description: What’s happening now?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Change
      description: How should it be improved?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which Calf module does this improvement relate to?
      options:
        - calf-ui
        - calf-file-picker
        - calf-webview
        - calf-permissions
        - calf-cupertino-icons
        - core
        - other
    validations:
      required: true

  - type: input
    id: other_module
    attributes:
      label: Specify Other Module
      description: If you selected "other" above, please specify the module name.
      placeholder: e.g., calf-geo, calf-navigation
    if:
      field: module
      equals: other

  - type: dropdown
    id: area
    attributes:
      label: Area of Improvement
      options:
        - UI Component
        - Gradle/Build
        - Documentation
        - Performance
    validations:
      required: true